# ── Server ───────────────────────────────────────────────
server.port=8080

# ── Database (Supabase PostgreSQL — India pooler) ────────
# Permanent local configuration for the verified Supabase pooler connection.
spring.datasource.url=jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0
spring.datasource.username=postgres.migeuxqmrcwhstifeysn
spring.datasource.password=Dhinesh@2006
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (Supabase free tier limits)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000

# ── JPA ──────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ── JWT ──────────────────────────────────────────────────
app.jwt.secret=studyvault-local-development-secret-key-change-me-32-chars-min
app.jwt.expiration-ms=604800000

# Seed the existing local account into the database on startup.
app.auth.seed-enabled=true
app.auth.seed-user-id=dev-user
app.auth.seed-username=Dhinesh Manikandan
