# ── Server ───────────────────────────────────────────────
server.port=${PORT:8080}

# ── Database (Supabase PostgreSQL — India pooler) ────────
# For local use, override these defaults with env vars in production.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/studyvault?sslmode=require&prepareThreshold=0}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (Supabase free tier limits)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000

# ── JPA ──────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ── JWT ──────────────────────────────────────────────────
app.jwt.secret=${APP_JWT_SECRET:studyvault-local-development-secret-key-change-me-32-chars-min}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:604800000}

# Seed the existing local account into the database on startup.
app.auth.seed-enabled=${APP_AUTH_SEED_ENABLED:false}
app.auth.seed-user-id=${APP_AUTH_SEED_USER_ID:dev-user}
app.auth.seed-username=${APP_AUTH_SEED_USERNAME:Dev User}
app.auth.seed-password=${APP_AUTH_SEED_PASSWORD:dev-password}

# ── Cloudinary ───────────────────────────────────────────
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# ── File Upload ───────────────────────────────────────────
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ── CORS ─────────────────────────────────────────────────
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:https://*.vercel.app}
